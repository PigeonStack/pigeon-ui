name: 功能请求
description: 提议一个新功能或改进
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你的功能提议！请尽量描述你的使用场景和期望方案。

  - type: textarea
    id: problem
    attributes:
      label: 问题 / 动机
      description: 描述你遇到的问题或缺失的功能。
      placeholder: 在使用 PTable 时，我需要排序功能，但目前不支持...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 期望方案
      description: 描述你希望的解决方案。
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 你考虑过的其他替代方案（如有）。

  - type: textarea
    id: context
    attributes:
      label: 补充信息
      description: 任何额外的上下文、截图或代码片段。
