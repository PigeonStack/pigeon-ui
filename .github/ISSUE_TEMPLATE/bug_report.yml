name: Bug 报告
description: 报告一个 Bug 或异常行为
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你报告 Bug！请尽量提供完整信息以帮助我们复现和修复。

  - type: textarea
    id: description
    attributes:
      label: Bug 描述
      description: 简要描述遇到的问题。
      placeholder: 点击某个按钮后应用崩溃...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 请提供最小化的复现步骤。
      placeholder: |
        1. 打开 Gallery
        2. 点击 PButton
        3. 观察到...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期望行为
      description: 描述你期望发生的行为。
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 实际行为
      description: 描述实际发生的行为。
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: 截图
      description: 如有 UI 相关问题，请附上截图。

  - type: input
    id: os
    attributes:
      label: 操作系统
      placeholder: Windows 11 23H2
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python 版本
      placeholder: "3.12.3"
    validations:
      required: true

  - type: input
    id: pyside6-version
    attributes:
      label: PySide6 版本
      placeholder: "6.8.0"
    validations:
      required: true

  - type: input
    id: pigeon-ui-version
    attributes:
      label: pigeon-ui 版本
      placeholder: "0.1.0"
    validations:
      required: true
