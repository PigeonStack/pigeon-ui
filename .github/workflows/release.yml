name: Release to PyPI

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  # ── 质量门禁（复用 CI 流程） ──
  lint:
    name: Lint & Typecheck
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Ruff check
        run: python -m ruff check src/ tests/ examples/

      - name: Ruff format check
        run: python -m ruff format --check src/ tests/ examples/

      - name: Mypy
        run: python -m mypy src/pigeon_ui/

      - name: QML lint
        run: python scripts/check_qmllint.py

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests with coverage
        run: python -m pytest tests/ -v --cov=pigeon_ui --cov-report=term-missing

      - name: Check coverage threshold
        run: python -m coverage report --fail-under=60

  # ── 版本一致性检查 ──
  verify-version:
    name: Verify tag matches package version
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check version consistency
        shell: pwsh
        run: |
          $tagVersion = "${{ github.ref_name }}" -replace '^v', ''
          $pkgVersion = python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])"
          if ($tagVersion -ne $pkgVersion) {
            Write-Error "Tag version ($tagVersion) does not match pyproject.toml version ($pkgVersion)"
            exit 1
          }
          Write-Host "Version verified: $tagVersion"

  # ── 构建 ──
  build:
    name: Build distribution
    runs-on: windows-latest
    needs: [lint, test, verify-version]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install build tools
        run: pip install hatch

      - name: Build wheel & sdist
        run: python -m hatch build

      - name: Verify wheel contents
        run: |
          pip install -e ".[dev]"
          python scripts/check_assets.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # ── 发布到 PyPI（Trusted Publisher / OIDC） ──
  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build]
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
