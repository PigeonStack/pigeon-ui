name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint & Typecheck
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Ruff check
        run: python -m ruff check src/ tests/ examples/

      - name: Ruff format check
        run: python -m ruff format --check src/ tests/ examples/

      - name: Mypy
        run: python -m mypy src/pigeon_ui/

      - name: QML lint
        run: python scripts/check_qmllint.py

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests with coverage
        run: python -m pytest tests/ -v --cov=pigeon_ui --cov-report=term-missing --cov-report=xml

      - name: Check coverage threshold
        run: python -m coverage report --fail-under=60

  build:
    name: Build
    runs-on: windows-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install build tools
        run: pip install hatch

      - name: Build wheel
        run: python -m hatch build

      - name: Verify wheel contents
        run: python scripts/check_assets.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
